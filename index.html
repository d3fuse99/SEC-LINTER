<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEC-LINTER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cyber-header">
        <div class="logo">SEC-LINTER</div>
    </div>
    <div class="container">
        <div class="panel left-panel">
            <div class="panel-header">INPUT CONSOLE</div>
            <textarea id="code-input" placeholder="PASTE YOUR SOURCE CODE HERE..."></textarea>
            <div id="drop-zone">
                <div class="drop-zone-text">DRAG & DROP FILES OR FOLDERS HERE</div>
                <div class="drop-zone-buttons">
                    <button id="select-files-btn" class="cyber-mini-btn">UPLOAD FILES</button>
                    <button id="select-folder-btn" class="cyber-mini-btn">UPLOAD FOLDER</button>
                </div>
                <input type="file" id="files-input" style="display: none;" multiple>
                <input type="file" id="folder-input" style="display: none;" webkitdirectory directory multiple>
            </div>
        </div>
        <div class="panel right-panel">
            <div class="panel-header">THREAT INTELLIGENCE LOGS</div>
            <div id="file-tabs" class="tabs-bar" style="display: none;"></div>
            <div id="console-logs" class="logs-container">
                <div class="log-entry system-log">AWAITING CODE SUBMISSION...</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
